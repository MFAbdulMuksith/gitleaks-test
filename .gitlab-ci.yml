gitleaks:
  image: ubuntu:22.04
  variables:
    GIT_DEPTH: 0                  # full history — required for gitleaks git .
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl
  script:
    - bash scripts/gitleaks-scan.sh
  artifacts:
    when: always                  # save report even when scan fails
    paths:
      - results.sarif
    expire_in: 30 days
