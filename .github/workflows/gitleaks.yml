name: CI Pipeline

# ─── TRIGGERS ──────────────────────────────────────────────────────────────
# Run on every push to every branch and on every pull request.
# Gitleaks always runs first; downstream jobs are gated on its result.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:   # allow manual runs from the Actions tab

# ─── DEFAULT PERMISSIONS ───────────────────────────────────────────────────
# Principle of least-privilege: jobs only elevate what they need.
permissions:
  contents: read

# ─── JOBS ──────────────────────────────────────────────────────────────────
jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1 — SECRET SCAN  (security gate — all other jobs depend on this)
  # ══════════════════════════════════════════════════════════════════════════
  gitleaks:
    name: "Security Gate: Secret Scan (Gitleaks)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload SARIF to GitHub Security tab

    outputs:
      scan-result: ${{ steps.scan.outcome }}   # expose pass/fail to downstream jobs

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      # fetch-depth: 0 fetches the FULL git history across all branches.
      # Without this, only the latest commit is fetched and historical
      # secrets in older commits are invisible to Gitleaks.
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Run Gitleaks ──────────────────────────────────────────────────
      # The official Gitleaks GitHub Action reads .gitleaks.toml automatically
      # if present. GITHUB_TOKEN is used to post PR check annotations.
      # GITLEAKS_LICENSE is only required for GitHub Organizations, not
      # personal accounts — leave commented unless needed.
      - name: Run Gitleaks secret scan
        id: scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      # ── 3. Upload SARIF ──────────────────────────────────────────────────
      # Only executes when Gitleaks found secrets (exit code 1 = failure).
      # SARIF results appear in GitHub → Security → Code Scanning Alerts.
      - name: Upload SARIF report to GitHub Security tab
        if: failure()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: gitleaks

      # ── 4. Upload scan artifact ──────────────────────────────────────────
      # Preserves the JSON report for 7 days regardless of pass/fail.
      - name: Upload Gitleaks JSON report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: results.json
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2 — BUILD  (blocked until secret scan passes)
  # ══════════════════════════════════════════════════════════════════════════
  build:
    name: "Build Application"
    runs-on: ubuntu-latest
    needs: gitleaks          # ← SECURITY GATE: will not start if gitleaks fails
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build application
        run: |
          echo "========================================="
          echo "  Secret scan passed — safe to build.   "
          echo "========================================="
          echo "Running build steps..."
          # Replace the lines below with your real build commands:
          #   npm ci && npm run build
          #   mvn package -DskipTests
          #   go build ./...
          echo "Build completed successfully."

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist/
            build/
          if-no-files-found: ignore
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 3 — TEST  (blocked until build passes)
  # ══════════════════════════════════════════════════════════════════════════
  test:
    name: "Run Test Suite"
    runs-on: ubuntu-latest
    needs: build             # ← also implicitly requires gitleaks via build
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          echo "Running test suite..."
          # Replace with your real test commands:
          #   npm test
          #   pytest --tb=short
          #   go test ./...
          echo "All tests passed."

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 4 — PACKAGE  (blocked until tests pass, only on main branch)
  # ══════════════════════════════════════════════════════════════════════════
  package:
    name: "Package & Containerize"
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package application
        run: |
          echo "Packaging application..."
          # Replace with your real packaging commands:
          #   docker build -t myapp:${{ github.sha }} .
          #   docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
          echo "Package step completed."

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 5 — DEPLOY  (blocked until package passes, only on main branch)
  # ══════════════════════════════════════════════════════════════════════════
  deploy:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production   # requires manual approval if configured
    permissions:
      contents: read
      id-token: write          # required for OIDC-based cloud auth (no hardcoded creds)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy application
        run: |
          echo "Deploying application..."
          # Replace with your real deploy commands:
          #   aws ecs update-service ...
          #   kubectl set image deployment/app app=myapp:${{ github.sha }}
          echo "Deployment completed successfully."
