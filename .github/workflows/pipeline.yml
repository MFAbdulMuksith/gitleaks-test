name: CI Pipeline

# ── TRIGGERS ────────────────────────────────────────────────────────────────
# Every branch push, every PR targeting master, manual dispatch, and a weekly
# full-history re-scan every Monday at 02:00 UTC.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

# ── JOBS ────────────────────────────────────────────────────────────────────
jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # STAGE 1 — SECURITY GATE
  # Runs first on every trigger. Has NO `needs:` dependency.
  # All downstream stages depend on this job through the `needs:` chain.
  # If this job exits non-zero, GitHub Actions automatically skips every job
  # that lists it (directly or transitively) in its `needs:` array.
  # ══════════════════════════════════════════════════════════════════════════
  gitleaks:
    name: "Stage 1 — Gitleaks security scan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required for upload-sarif
      pull-requests: write      # required to post PR comments via github-script

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: gitleaks

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report-${{ github.sha }}
          path: results.sarif
          retention-days: 30

      - name: Comment on PR when secrets found
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body: [
                '## ⚠️ Gitleaks detected secrets in this PR',
                '',
                '**Pipeline stopped. Stages 2–4 will not run.**',
                '',
                'Required actions before this PR can merge:',
                '1. Rotate the exposed credential immediately',
                '2. Remove it from Git history using git filter-repo',
                '3. Add fingerprint to .gitleaksignore if false positive',
                '',
                'See Security → Code scanning alerts for full details.'
              ].join('\n')
            })

  # ══════════════════════════════════════════════════════════════════════════
  # STAGE 2 — BUILD
  # needs: [gitleaks] — only starts when Stage 1 exits 0 (clean).
  # If Stage 1 failed, GitHub skips this job automatically. No if: needed.
  # ══════════════════════════════════════════════════════════════════════════
  build:
    name: "Stage 2 — Build"
    runs-on: ubuntu-latest
    needs: [gitleaks]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build application
        run: |
          echo "================================================="
          echo "  Stage 1 (Gitleaks) passed — building safely.  "
          echo "================================================="
          python3 -m py_compile src/app.py
          echo "Syntax check passed."

  # ══════════════════════════════════════════════════════════════════════════
  # STAGE 3 — TEST
  # needs: [build] — transitively requires gitleaks + build both passing.
  # ══════════════════════════════════════════════════════════════════════════
  test:
    name: "Stage 3 — Test"
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run test suite
        run: python3 -m unittest discover -s tests -v

  # ══════════════════════════════════════════════════════════════════════════
  # STAGE 4 — DEPLOY
  # needs: [test] — transitively requires gitleaks + build + test all passing.
  # ══════════════════════════════════════════════════════════════════════════
  deploy:
    name: "Stage 4 — Deploy"
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy application
        run: |
          echo "All stages passed — deploying."
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
