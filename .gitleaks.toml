title = "Gitleaks — gitleaks-test"

# ── EXTEND DEFAULT RULESET ───────────────────────────────────────────────────
# Inherits all 150+ built-in rules (AWS, GitHub, Stripe, GCP, Azure, etc.)
# then adds project-specific rules and overrides below.
[extend]
useDefault = true

# Disable generic-api-key to prevent double-match false positives.
# github-pat is more specific; generic-api-key fires on the same line too.
# Confirmed double-match: fake-secrets.env:6 fires both github-pat AND
# generic-api-key for the same GITHUB_TOKEN value. Disabling the generic
# rule keeps the more accurate specific rule and removes the noise.
disabledRules = ["generic-api-key"]

# ── CUSTOM RULES ────────────────────────────────────────────────────────────

[[rules]]
id          = "company-api-key"
description = "Company internal API key (COMPANY_API_KEY_ prefix)"
regex       = '''COMPANY_API_KEY_[A-Za-z0-9]{15,}'''
keywords    = ["COMPANY_API_KEY"]
tags        = ["custom", "company"]

    # Technique 4 — stopword suppression:
    # If the extracted secret value contains any of these strings the finding
    # is dropped.  "changeme" / "placeholder" are obviously not real keys.
    [[rules.allowlists]]
    description = "Suppress obvious placeholder and test values"
    stopwords   = ["changeme", "placeholder", "example", "test_key"]

[[rules]]
id          = "internal-jwt-secret"
description = "JWT signing secret assigned to a known variable name"
regex       = '''(?i)(jwt[_-]?secret|signing[_-]?key)\s*[=:]\s*["']?[A-Za-z0-9+/=_\-]{20,}'''
keywords    = ["jwt_secret", "jwt-secret", "signing_key", "signingkey"]
tags        = ["custom", "jwt"]

[[rules]]
id          = "database-connection-string"
description = "Database URL with embedded password"
regex       = '''(?i)(postgres|mysql|mongodb|mssql):\/\/[^:]+:[^@]{8,}@'''
keywords    = ["postgres://", "mysql://", "mongodb://", "mssql://"]
tags        = ["custom", "database"]

    # Technique 3 — path-based allowlist:
    # Test assertion strings (url.startswith("postgres://")) plus the @patch.dict
    # decorator on the next line cause a multi-line false positive. Exclude
    # all tests/*.py from this rule entirely.
    [[rules.allowlists]]
    description = "Exclude test files from database URL rule (assertion strings, not real URLs)"
    paths = ['''(^|\/)tests\/.*\.py$''']

    # Technique 5 — regex match against full line:
    # Local / loopback DB URLs are never production credentials.
    # regexTarget = "line" evaluates the entire source line, not just the match.
    [[rules.allowlists]]
    description = "Suppress localhost and 127.0.0.1 DB URLs — not production credentials"
    condition   = "OR"
    regexTarget = "line"
    regexes     = ['localhost', '127\.0\.0\.1', 'test_password']

# ── GLOBAL ALLOWLIST ─────────────────────────────────────────────────────────
# NOTE: v8.24.2 uses [allowlist] (singular).
#       v8.25.0+ uses [[allowlists]] (plural array).
#       The [[allowlists]] syntax is silently ignored on v8.24.2 — paths will
#       NOT be suppressed. Use [allowlist] until upgrading to v8.25.0+.
[allowlist]
description = "Paths and values that are never secrets"

paths = [
  # Gitleaks report output files written by the scanner itself
  '''(^|\/)results\.(json|sarif)$''',
  '''(^|\/)report\.(json|csv|xml|sarif)$''',
  '''(^|\/)git-report\.json$''',
  # The ignore file itself (contains fingerprint strings that look like secrets)
  '''(^|\/)\.(gitleaks)?ignore$''',
  # Claude Code config dir — contains shell command history, not secrets
  '''(^|\/)\.claude\/''',
  # Dependency lock files (contain hash strings that trigger entropy rules)
  '''(^|\/)package-lock\.json$''',
  '''(^|\/)yarn\.lock$''',
  '''(^|\/)Gemfile\.lock$''',
]

# stopwords: if the extracted secret VALUE contains any of these strings,
# the finding is suppressed — useful for obvious placeholder patterns.
stopwords = [
  "example",
  "EXAMPLE",
  "placeholder",
  "changeme",
  "CHANGEME",
  "your-secret-here",
]
